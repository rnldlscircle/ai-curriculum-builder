<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 교육 커리큘럼 빌더</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }

    .cell-edit {
      min-height: 38px;
      padding: 6px 8px;
      width: 100%;
      outline: none;
      border: 2px solid transparent;
      border-radius: 5px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.55;
      font-size: 12.5px;
      transition: border-color .12s, background .12s;
    }
    .cell-edit:hover { border-color: #d1d5db; }
    .cell-edit:focus { border-color: #3b82f6; background: #eff6ff; }

    .sel-input {
      width: 100%;
      border: 2px solid transparent;
      border-radius: 5px;
      padding: 6px 8px;
      font-size: 12.5px;
      background: transparent;
      outline: none;
      cursor: pointer;
      transition: border-color .12s, background .12s;
      -webkit-appearance: auto;
    }
    .sel-input:hover { border-color: #d1d5db; }
    .sel-input:focus { border-color: #3b82f6; background: #eff6ff; }

    .txt-input {
      width: 100%;
      border: 2px solid transparent;
      border-radius: 5px;
      padding: 6px 8px;
      font-size: 12.5px;
      background: transparent;
      outline: none;
      text-align: center;
      transition: border-color .12s, background .12s;
    }
    .txt-input:hover { border-color: #d1d5db; }
    .txt-input:focus { border-color: #3b82f6; background: #eff6ff; }

    thead th { position: sticky; top: 0; z-index: 10; }

    tr:nth-child(even) td { background: #f9fafb; }
    tr:hover td { background: #eff6ff !important; transition: background .1s; }
    tr.selected td { background: #fef9c3 !important; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #dbeafe;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal.hidden { display: none; }

    .toast {
      position: fixed; bottom: 20px; right: 20px;
      padding: 10px 16px; border-radius: 8px;
      color: #fff; font-size: 13px; font-weight: 500;
      z-index: 200; animation: fadeIn .2s ease;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

  <!-- Top Bar -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-20 shadow-sm">
    <div class="px-5 h-[52px] flex items-center gap-3 max-w-[1600px] mx-auto">
      <!-- Logo -->
      <div class="flex items-center gap-2 shrink-0">
        <div class="w-7 h-7 bg-blue-600 rounded-md flex items-center justify-center">
          <span class="text-white text-[10px] font-black tracking-tight">D1</span>
        </div>
        <span class="font-semibold text-gray-800 text-[13.5px] hidden sm:block">AI 커리큘럼 빌더</span>
      </div>

      <div class="w-px h-5 bg-gray-200 shrink-0"></div>

      <!-- Edu Info -->
      <div class="flex items-center gap-2 flex-1 overflow-x-auto">
        <input id="edu-org" type="text" placeholder="기관명" maxlength="30"
          class="border border-gray-200 rounded-md px-2.5 py-1 text-[12.5px] w-28 shrink-0 focus:outline-none focus:border-blue-400 focus:bg-blue-50 placeholder-gray-300">
        <input id="edu-name" type="text" placeholder="교육명 (예: AX 인재육성 역량강화 교육)" maxlength="60"
          class="border border-gray-200 rounded-md px-2.5 py-1 text-[12.5px] w-60 shrink-0 focus:outline-none focus:border-blue-400 focus:bg-blue-50 placeholder-gray-300">
        <select id="edu-level" class="border border-gray-200 rounded-md px-2 py-1 text-[12.5px] bg-white shrink-0 focus:outline-none focus:border-blue-400">
          <option value="입문">입문</option>
          <option value="초급" selected>초급</option>
          <option value="중급">중급</option>
          <option value="심화">심화</option>
        </select>
        <div class="flex items-center gap-1 shrink-0">
          <input id="edu-hours" type="number" value="7" min="1" max="80"
            class="border border-gray-200 rounded-md px-2 py-1 text-[12.5px] w-14 text-center focus:outline-none focus:border-blue-400">
          <span class="text-[12px] text-gray-400">H</span>
        </div>
        <select id="edu-method" class="border border-gray-200 rounded-md px-2 py-1 text-[12.5px] bg-white shrink-0 focus:outline-none focus:border-blue-400">
          <option value="대면">대면</option>
          <option value="비대면">비대면</option>
          <option value="온·오프라인 병행">온·오프라인</option>
        </select>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-1.5 shrink-0">
        <button onclick="generateWithAI()" id="gen-btn"
          class="flex items-center gap-1 bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-md text-[12.5px] font-medium transition-colors shadow-sm">
          ✨ AI 생성
        </button>
        <button onclick="addRow()"
          class="border border-gray-200 hover:bg-gray-50 text-gray-600 px-2.5 py-1.5 rounded-md text-[12.5px] transition-colors">
          + 추가
        </button>
        <button onclick="deleteSelected()"
          class="border border-gray-200 hover:bg-red-50 hover:text-red-500 hover:border-red-200 text-gray-500 px-2.5 py-1.5 rounded-md text-[12.5px] transition-colors">
          − 삭제
        </button>
        <div class="w-px h-4 bg-gray-200"></div>
        <button onclick="exportCSV()"
          class="flex items-center gap-1 bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-md text-[12.5px] font-medium transition-colors shadow-sm">
          ↓ 엑셀
        </button>
        <button onclick="openApiModal()" title="API 키 설정"
          class="border border-gray-200 hover:bg-gray-50 text-gray-400 w-7 h-7 rounded-md flex items-center justify-center transition-colors text-sm">
          ⚙
        </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="px-5 py-3 max-w-[1600px] mx-auto">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="overflow-auto" style="max-height: calc(100vh - 100px);">
        <table class="w-full border-collapse" style="min-width:1120px;">
          <thead>
            <tr class="bg-gray-800 text-white text-[11.5px]">
              <th class="px-3 py-2.5 w-9">
                <input type="checkbox" id="chk-all" onchange="toggleAll(this)" class="w-3.5 h-3.5 rounded cursor-pointer">
              </th>
              <th class="px-3 py-2.5 text-left font-semibold" style="width:60px">구분</th>
              <th class="px-3 py-2.5 text-left font-semibold" style="width:160px">프로그램명</th>
              <th class="px-3 py-2.5 text-left font-semibold" style="min-width:220px">세부내용(커리큘럼)</th>
              <th class="px-3 py-2.5 text-left font-semibold" style="width:145px">실습내용</th>
              <th class="px-3 py-2.5 text-left font-semibold" style="width:125px">산출물</th>
              <th class="px-3 py-2.5 text-left font-semibold" style="width:105px">강의방법</th>
              <th class="px-3 py-2.5 text-left font-semibold" style="width:155px">활용AI도구</th>
              <th class="px-3 py-2.5 text-left font-semibold" style="width:75px">강의시간</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="flex items-center justify-between mt-1.5 px-0.5">
      <span id="row-count" class="text-[11.5px] text-gray-400"></span>
      <span class="text-[11px] text-gray-300">* 본 커리큘럼은 수강생 수준 및 강사진에 따라 변경될 수 있습니다.</span>
    </div>
  </main>

  <!-- API Key Modal -->
  <div id="api-modal" class="modal hidden" onclick="if(event.target===this)closeApiModal()">
    <div class="bg-white rounded-xl shadow-xl p-6 w-[400px] mx-4">
      <h3 class="font-semibold text-gray-800 text-[15px] mb-1">Claude API 키 설정</h3>
      <p class="text-[12px] text-gray-400 mb-4">AI 자동생성 기능에 필요합니다. 키는 이 브라우저(localStorage)에만 저장됩니다.</p>
      <input id="api-key-input" type="password" placeholder="sk-ant-api03-..."
        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400 focus:bg-blue-50 mb-1 font-mono">
      <p class="text-[11px] text-gray-400 mb-4">
        API 키는 <a href="https://console.anthropic.com" target="_blank" class="text-blue-500 underline">console.anthropic.com</a>에서 발급받을 수 있습니다.
      </p>
      <div class="flex gap-2">
        <button onclick="saveApiKey()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-sm font-medium transition-colors">저장</button>
        <button onclick="closeApiModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 py-2 rounded-lg text-sm transition-colors">취소</button>
      </div>
    </div>
  </div>

  <!-- Loading Modal -->
  <div id="loading-modal" class="modal hidden">
    <div class="bg-white rounded-xl shadow-xl px-12 py-10 flex flex-col items-center gap-5">
      <div class="spinner"></div>
      <div class="text-center">
        <p class="font-semibold text-gray-700 text-[14px]">AI가 커리큘럼을 생성하고 있습니다</p>
        <p class="text-[12px] text-gray-400 mt-1">교육 수준과 기관 특성을 분석 중...</p>
      </div>
    </div>
  </div>

  <script>
  /* ──────────────────────────────────────────────
     Data & Config
  ────────────────────────────────────────────── */
  const DATA_KEYS = ['구분','프로그램명','세부내용','실습내용','산출물','강의방법','활용AI도구','강의시간'];
  const METHOD_OPTIONS = ['이론','이론+실습','실습'];
  const STORAGE_KEY = 'd1_curriculum_data';

  // Default sample data (고려대학교의료원 스타일)
  const DEFAULT_DATA = [
    { 구분:'M1', 프로그램명:'생성형 AI 개념·활용', 세부내용:'생성형 AI 개념 및 트렌드\n생성형 AI 종류 및 작동 원리 이해\n주요 AI 도구 기능분석 및 체험', 실습내용:'AI 만들기\n주요 AI 도구 체험 실습', 산출물:'AI 활용 MAP', 강의방법:'이론+실습', 활용AI도구:'ChatGPT, Gemini, Claude', 강의시간:'2H' },
    { 구분:'M2', 프로그램명:'프롬프트 엔지니어링 기초 및 실무적용', 세부내용:'프롬프트 구조(역할/조건/출력) 이해\n질문 방식에 따른 결과 차이 비교\n부서별 반복업무 AI 활용 프롬프트 설계', 실습내용:'사무국 자료분석 및 요약\n민원 대응 매뉴얼 제작', 산출물:'프롬프트 기초 설계서\n민원응대 프롬프트', 강의방법:'이론+실습', 활용AI도구:'ChatGPT, MS Office', 강의시간:'3H' },
    { 구분:'M3', 프로그램명:'AI 윤리 및 보안수칙', 세부내용:'AI 활용 시 보안·개인정보·데이터활용 기준\n부서별 민감정보 AI 활용 시 보안수칙 및 활용가이드', 실습내용:'-', 산출물:'AI 보안 가이드라인', 강의방법:'이론', 활용AI도구:'ChatGPT', 강의시간:'1H' },
    { 구분:'M4', 프로그램명:'AI 오류검증 및 활용전략', 세부내용:'생성형 AI 환각(Hallucination), 편향 이해\nAI 활용 시 안전하고 정확한 질문 방법\n업무정확성 검증 체크리스트 만들기', 실습내용:'AI 체크리스트 만들기', 산출물:'AI 체크리스트', 강의방법:'이론+실습', 활용AI도구:'ChatGPT', 강의시간:'1H' }
  ];

  let rows = loadData();

  /* ──────────────────────────────────────────────
     Persistence
  ────────────────────────────────────────────── */
  function loadData() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : [...DEFAULT_DATA];
    } catch { return [...DEFAULT_DATA]; }
  }

  function saveData() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(rows)); } catch {}
  }

  /* ──────────────────────────────────────────────
     Sync DOM → rows[] before any re-render
  ────────────────────────────────────────────── */
  function syncDOM() {
    document.querySelectorAll('[data-row]').forEach(el => {
      const i = +el.dataset.row;
      const k = el.dataset.key;
      if (!rows[i] || !k) return;
      if (el.tagName === 'DIV') rows[i][k] = el.innerText.trim();
      else rows[i][k] = el.value;
    });
  }

  /* ──────────────────────────────────────────────
     Render
  ────────────────────────────────────────────── */
  function render() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    rows.forEach((row, i) => {
      const tr = document.createElement('tr');
      tr.dataset.row = i;
      tr.className = 'border-t border-gray-100';

      // Checkbox
      const tdChk = document.createElement('td');
      tdChk.className = 'px-3 py-1 text-center align-top';
      const chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.className = 'row-chk w-3.5 h-3.5 rounded cursor-pointer';
      chk.dataset.row = i;
      chk.addEventListener('change', e => {
        e.target.closest('tr').classList.toggle('selected', e.target.checked);
        updateSelectAll();
      });
      tdChk.appendChild(chk);
      tr.appendChild(tdChk);

      // Data cells
      DATA_KEYS.forEach(key => {
        const td = document.createElement('td');
        td.className = 'px-1 py-0.5 align-top';

        if (key === '강의방법') {
          const sel = document.createElement('select');
          sel.className = 'sel-input';
          sel.dataset.row = i;
          sel.dataset.key = key;
          METHOD_OPTIONS.forEach(opt => {
            const o = document.createElement('option');
            o.value = opt; o.textContent = opt;
            if (opt === row[key]) o.selected = true;
            sel.appendChild(o);
          });
          sel.addEventListener('change', e => { rows[i][key] = e.target.value; saveData(); });
          td.appendChild(sel);
        } else if (key === '강의시간') {
          const inp = document.createElement('input');
          inp.type = 'text';
          inp.className = 'txt-input';
          inp.value = row[key] || '';
          inp.placeholder = '1H';
          inp.dataset.row = i;
          inp.dataset.key = key;
          inp.addEventListener('input', e => { rows[i][key] = e.target.value; });
          inp.addEventListener('blur', () => saveData());
          td.appendChild(inp);
        } else {
          const div = document.createElement('div');
          div.contentEditable = 'true';
          div.className = 'cell-edit';
          div.dataset.row = i;
          div.dataset.key = key;
          div.innerText = row[key] || '';
          div.addEventListener('blur', e => { rows[i][key] = e.target.innerText.trim(); saveData(); });
          td.appendChild(div);
        }

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    updateCount();
  }

  function updateCount() {
    const h = rows.reduce((acc, r) => acc + parseFloat(r.강의시간 || 0), 0);
    document.getElementById('row-count').textContent =
      `${rows.length}개 모듈 · 총 ${isNaN(h) ? '-' : h}H`;
  }

  /* ──────────────────────────────────────────────
     Row Operations
  ────────────────────────────────────────────── */
  function addRow() {
    syncDOM();
    rows.push({ 구분:`M${rows.length+1}`, 프로그램명:'', 세부내용:'', 실습내용:'', 산출물:'', 강의방법:'이론+실습', 활용AI도구:'ChatGPT', 강의시간:'1H' });
    render();
    // Focus new row's 프로그램명
    const edits = document.querySelectorAll('.cell-edit');
    if (edits.length >= 2) edits[edits.length - 7].focus();
    saveData();
  }

  function deleteSelected() {
    syncDOM();
    const del = new Set(Array.from(document.querySelectorAll('.row-chk:checked')).map(c => +c.dataset.row));
    if (!del.size) { showToast('삭제할 행을 선택하세요.', 'warn'); return; }
    rows = rows.filter((_, i) => !del.has(i));
    render();
    saveData();
    showToast(`${del.size}개 행이 삭제되었습니다.`);
  }

  function toggleAll(chk) {
    document.querySelectorAll('.row-chk').forEach(c => {
      c.checked = chk.checked;
      c.closest('tr').classList.toggle('selected', chk.checked);
    });
  }

  function updateSelectAll() {
    const all = document.querySelectorAll('.row-chk');
    const checked = document.querySelectorAll('.row-chk:checked');
    document.getElementById('chk-all').checked = all.length && all.length === checked.length;
    document.getElementById('chk-all').indeterminate = checked.length > 0 && checked.length < all.length;
  }

  /* ──────────────────────────────────────────────
     API Key Modal
  ────────────────────────────────────────────── */
  function openApiModal() {
    document.getElementById('api-key-input').value = localStorage.getItem('d1_claude_key') || '';
    document.getElementById('api-modal').classList.remove('hidden');
  }
  function closeApiModal() {
    document.getElementById('api-modal').classList.add('hidden');
  }
  function saveApiKey() {
    const k = document.getElementById('api-key-input').value.trim();
    if (k) { localStorage.setItem('d1_claude_key', k); showToast('API 키가 저장되었습니다.'); }
    closeApiModal();
  }

  /* ──────────────────────────────────────────────
     AI Generation
  ────────────────────────────────────────────── */
  async function generateWithAI() {
    const apiKey = localStorage.getItem('d1_claude_key');
    if (!apiKey) { openApiModal(); return; }

    const org   = document.getElementById('edu-org').value   || '공공기관';
    const name  = document.getElementById('edu-name').value  || 'AI 활용역량 강화 교육';
    const level = document.getElementById('edu-level').value;
    const hours = document.getElementById('edu-hours').value || 7;
    const method = document.getElementById('edu-method').value;

    const levelGuide = {
      입문: '① AI 기초 개념 이해 ② 주요 도구 체험 ③ 간단한 프롬프트 작성 ④ AI 윤리/보안 — 총 3~4개 모듈',
      초급: '① 생성형AI 개념+도구 ② 프롬프트 엔지니어링 기초 ③ 실무 문서 활용 ④ AI 윤리/보안 ⑤ 오류 검증 — 총 4~5개 모듈',
      중급: '① AI 원리/LLM ② 프롬프트 기초·심화 ③ RAG 개념 및 실습 ④ Agent 만들기 ⑤ 데이터 분석/시각화 ⑥ AX 과제 기획·발표 — 총 6~8개 모듈, 총2일',
      심화: '차시별 구성: 1차시-AI 도구 비교/NotebookLM 심화 2차시-업무 자동화 워크플로우 3차시-프롬프트 완성 문서분석+봇제작+성과공유 — 총 3차시, 차시당 2H',
    };

    const prompt = `당신은 AI 활용역량 강화 교육 커리큘럼 전문 설계자입니다.
아래 조건에 맞는 교육 커리큘럼을 JSON으로 생성해주세요.

■ 교육명: ${name}
■ 대상기관: ${org}
■ 교육수준: ${level}
■ 총강의시간: ${hours}H
■ 교육방법: ${method}
■ 수강대상: 공공기관 직원 (비개발자, IT 비전문가 중심)
■ 주제: AI 활용역량 강화

■ 수준 가이드:
${levelGuide[level]}

■ 컬럼 작성 기준:
- 구분: M1, M2 등 (심화는 1차시, 2차시 등 사용)
- 프로그램명: 모듈 핵심 주제 (20자 이내)
- 세부내용: 강의 세부 항목들을 줄바꿈(\\n)으로 구분하여 3~5개 기술
- 실습내용: 수강생이 직접 수행하는 실습 (없으면 "-")
- 산출물: 실습 완료 후 만들어지는 결과물 (없으면 "-")
- 강의방법: 반드시 "이론", "이론+실습", "실습" 중 하나만
- 활용AI도구: 실제 사용 도구 (ChatGPT, Gemini, Claude, NotebookLM, Copilot, DALL-E, MS Office, Google Sheets 중 적절히)
- 강의시간: 강의시간 합계가 정확히 ${hours}H가 되도록 배분 (예: "1H", "2H", "1.5H")

■ 출력: JSON만 출력. 다른 설명이나 마크다운 없이.
{"modules":[{"구분":"M1","프로그램명":"...","세부내용":"항목1\\n항목2\\n항목3","실습내용":"...","산출물":"...","강의방법":"이론+실습","활용AI도구":"ChatGPT","강의시간":"2H"},...]}`

    document.getElementById('loading-modal').classList.remove('hidden');
    document.getElementById('gen-btn').disabled = true;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-request-source': 'browser'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 4096,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.error?.message || `HTTP 오류 ${res.status}`);
      }

      const data = await res.json();
      const text = data.content?.[0]?.text || '';

      const match = text.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('응답에서 JSON을 찾을 수 없습니다.');

      const parsed = JSON.parse(match[0]);
      if (!Array.isArray(parsed.modules) || !parsed.modules.length)
        throw new Error('커리큘럼 모듈 데이터가 비어 있습니다.');

      rows = parsed.modules.map(m => ({
        구분:    m.구분     || '',
        프로그램명: m.프로그램명 || '',
        세부내용: m.세부내용 || '',
        실습내용: m.실습내용 || '',
        산출물:  m.산출물   || '',
        강의방법: METHOD_OPTIONS.includes(m.강의방법) ? m.강의방법 : '이론+실습',
        활용AI도구: m.활용AI도구 || 'ChatGPT',
        강의시간: m.강의시간 || '1H'
      }));

      render();
      saveData();
      showToast(`✅ ${rows.length}개 모듈 커리큘럼 생성 완료!`);

    } catch (err) {
      console.error(err);
      showToast('오류: ' + err.message, 'error');
    } finally {
      document.getElementById('loading-modal').classList.add('hidden');
      document.getElementById('gen-btn').disabled = false;
    }
  }

  /* ──────────────────────────────────────────────
     CSV Export (BOM for Excel Korean)
  ────────────────────────────────────────────── */
  function exportCSV() {
    syncDOM();
    const org   = document.getElementById('edu-org').value   || '';
    const name  = document.getElementById('edu-name').value  || '교육';
    const level = document.getElementById('edu-level').value;
    const hours = document.getElementById('edu-hours').value;
    const method = document.getElementById('edu-method').value;

    const esc = v => `"${String(v || '').replace(/"/g, '""')}"`;

    const csvRows = [
      [`교육명: ${name}`, `대상기관: ${org}`, `수준: ${level}`, `총시간: ${hours}H`, `교육방법: ${method}`],
      [],
      ['구분','프로그램명','세부내용(커리큘럼)','실습내용','산출물','강의방법','활용AI도구','강의시간'],
      ...rows.map(r => [
        r.구분, r.프로그램명,
        (r.세부내용 || '').replace(/\n/g,' | '),
        (r.실습내용 || '').replace(/\n/g,' | '),
        (r.산출물   || '').replace(/\n/g,' | '),
        r.강의방법, r.활용AI도구, r.강의시간
      ])
    ];

    const csv = csvRows.map(row => row.map(esc).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    const date = new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','');
    a.href = URL.createObjectURL(blob);
    a.download = `커리큘럼_${org||'기관'}_${level}_${date}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('엑셀 파일이 다운로드되었습니다.');
  }

  /* ──────────────────────────────────────────────
     Toast
  ────────────────────────────────────────────── */
  function showToast(msg, type = 'success') {
    const colors = { success:'bg-gray-800', error:'bg-red-500', warn:'bg-amber-500' };
    const t = document.createElement('div');
    t.className = `toast ${colors[type] || colors.success}`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => {
      t.style.transition = 'opacity .3s';
      t.style.opacity = '0';
      setTimeout(() => t.remove(), 300);
    }, 2800);
  }

  /* ──────────────────────────────────────────────
     Keyboard shortcuts
  ────────────────────────────────────────────── */
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { addRow(); e.preventDefault(); }
  });

  /* ──────────────────────────────────────────────
     Init
  ────────────────────────────────────────────── */
  render();
  </script>
</body>
</html>
